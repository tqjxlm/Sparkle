          macos-certificate-password: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_PASSWORD }}
          macos-signing-identity: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          macos-notarization-username: ${{ secrets.APPLE_NOTARIZATION_USERNAME }}
          macos-notarization-password: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
          apple-team-id: ${{ secrets.APPLE_DEVELOPER_TEAM_ID }}
          ios-certificate-p12-base64: ${{ secrets.APPLE_DEVELOPMENT_CERTIFICATE_P12_BASE64 }}
          ios-certificate-password: ${{ secrets.APPLE_DEVELOPMENT_CERTIFICATE_PASSWORD }}
          ios-appstore-issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          ios-appstore-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          ios-appstore-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}

  test-windows-glfw:
    name: test (windows-latest, glfw, Release)
    needs: release-windows-glfw
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Mesa Lavapipe
        uses: ./.github/actions/setup-mesa

      # the release package already carries the cooked content in its packed resources
      - name: Download app
        uses: actions/download-artifact@v8
        with:
          name: release-glfw-windows-latest-Release
          path: build_system/glfw/product

      - name: Extract app
        shell: bash
        run: >-
          python3 -m zipfile -e build_system/glfw/product/windows-glfw-Release.zip
          build_system/glfw/output/

      # the step timeout bounds a hung app; the log dump below then still runs
      - name: Run Tests
        timeout-minutes: 120
        shell: bash
        env:
          # the hosted macos runners' paravirtual GPU silently renders MTLHeap-placed resources
          # as solid magenta through MoltenVK; force dedicated allocations instead. no effect on
          # cells that do not run MoltenVK
          MVK_CONFIG_USE_MTLHEAP: 0
          # the suite nests python processes whose block-buffered output would otherwise
          # reach the live log minutes late and out of order
          PYTHONUNBUFFERED: 1
        run: python3 dev/run_tests.py --framework glfw --config Release --software

      - name: Upload Test Screenshot
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-screenshots-glfw-windows-latest
          path: build_system/glfw/output/build/generated/screenshots/

  release-ubuntu-glfw:
    name: release (ubuntu-latest, glfw, Release)
    needs: [build-ubuntu-glfw-release, cook]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Release Platform
        uses: ./.github/actions/release-platform
        with:
          framework: glfw
          os: ubuntu-latest
          build-type: Release
          macos-certificate-p12-base64: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_P12_BASE64 }}
          macos-certificate-password: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_PASSWORD }}
          macos-signing-identity: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          macos-notarization-username: ${{ secrets.APPLE_NOTARIZATION_USERNAME }}
          macos-notarization-password: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
          apple-team-id: ${{ secrets.APPLE_DEVELOPER_TEAM_ID }}
          ios-certificate-p12-base64: ${{ secrets.APPLE_DEVELOPMENT_CERTIFICATE_P12_BASE64 }}
          ios-certificate-password: ${{ secrets.APPLE_DEVELOPMENT_CERTIFICATE_PASSWORD }}
          ios-appstore-issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          ios-appstore-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          ios-appstore-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}

  test-ubuntu-glfw:
    name: test (ubuntu-latest, glfw, Release)
    needs: release-ubuntu-glfw
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Mesa Lavapipe
        uses: ./.github/actions/setup-mesa

      # the released linux binary links libglfw at runtime even in headless mode
      - name: Install GLFW runtime
        shell: bash
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libglfw3

      # the release package already carries the cooked content in its packed resources
      - name: Download app
        uses: actions/download-artifact@v8
        with:
          name: release-glfw-ubuntu-latest-Release
          path: build_system/glfw/product

      # unzip, not python zipfile: extraction must preserve the executable bit of the binary
      - name: Extract app
        shell: bash
        run: |
          mkdir -p build_system/glfw/output
          unzip -q build_system/glfw/product/linux-glfw-Release.zip -d build_system/glfw/output/

      # the step timeout bounds a hung app; the log dump below then still runs
      - name: Run Tests
        timeout-minutes: 120
        shell: bash
        env:
          # the hosted macos runners' paravirtual GPU silently renders MTLHeap-placed resources
          # as solid magenta through MoltenVK; force dedicated allocations instead. no effect on
          # cells that do not run MoltenVK
          MVK_CONFIG_USE_MTLHEAP: 0
          # the suite nests python processes whose block-buffered output would otherwise
          # reach the live log minutes late and out of order
          PYTHONUNBUFFERED: 1
        run: python3 dev/run_tests.py --framework glfw --config Release --software

      - name: Dump app logs
        if: failure()
        shell: bash
        run: |
          echo "=== app logs ==="
          cat ~/Documents/sparkle/logs/*.log 2>/dev/null || true
          cat build_system/glfw/output/build/generated/logs/*.log 2>/dev/null || true

      - name: Upload Test Screenshot
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-screenshots-glfw-ubuntu-latest
          path: build_system/glfw/output/build/generated/screenshots/

  release-ubuntu-android:
    name: release (ubuntu-latest, android, Release)
    needs: [build-ubuntu-android-release, cook]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Release Platform
        uses: ./.github/actions/release-platform
        with:
          framework: android
          os: ubuntu-latest
          build-type: Release
          macos-certificate-p12-base64: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_P12_BASE64 }}
          macos-certificate-password: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_PASSWORD }}
          macos-signing-identity: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          macos-notarization-username: ${{ secrets.APPLE_NOTARIZATION_USERNAME }}
          macos-notarization-password: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
          apple-team-id: ${{ secrets.APPLE_DEVELOPER_TEAM_ID }}
          ios-certificate-p12-base64: ${{ secrets.APPLE_DEVELOPMENT_CERTIFICATE_P12_BASE64 }}
          ios-certificate-password: ${{ secrets.APPLE_DEVELOPMENT_CERTIFICATE_PASSWORD }}
          ios-appstore-issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          ios-appstore-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          ios-appstore-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}

  release-ubuntu-android-x86_64:
    name: release (ubuntu-latest, android, Release, x86_64)
    needs: [build-ubuntu-android-x86_64-release, cook]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Release Platform
        uses: ./.github/actions/release-platform
        with:
          framework: android
          os: ubuntu-latest
          build-type: Release
          abi: x86_64
          macos-certificate-p12-base64: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_P12_BASE64 }}
          macos-certificate-password: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_PASSWORD }}
          macos-signing-identity: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          macos-notarization-username: ${{ secrets.APPLE_NOTARIZATION_USERNAME }}
          macos-notarization-password: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
          apple-team-id: ${{ secrets.APPLE_DEVELOPER_TEAM_ID }}
          ios-certificate-p12-base64: ${{ secrets.APPLE_DEVELOPMENT_CERTIFICATE_P12_BASE64 }}
          ios-certificate-password: ${{ secrets.APPLE_DEVELOPMENT_CERTIFICATE_PASSWORD }}
          ios-appstore-issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          ios-appstore-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          ios-appstore-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}

  test-ubuntu-android-x86_64:
    name: test (ubuntu-latest, android, Release, x86_64)
    needs: release-ubuntu-android-x86_64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      # the suite drives the app through build.py, which needs the build prerequisites;
      # the android cell needs the SDK for adb and the emulator
      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        with:
          framework: android
          os: ubuntu-latest

      # the emulator needs hardware virtualization; hosted ubuntu runners expose
      # /dev/kvm but leave it root-only
      - name: Enable KVM
        shell: bash
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # the AVD is deliberately NOT cached: the snapshot entry weighs ~4GB, and duplicated
      # per branch it evicts every compiler cache in the repo's 10GB actions-cache quota
      # (a cold windows rebuild costs ~20 minutes); the suite seeds a fresh AVD in ~5
      # minutes instead (cold boot + clean shutdown)

      # the release package already carries the cooked content in its packed resources
      - name: Download app
        uses: actions/download-artifact@v8
        with:
          name: release-android-ubuntu-latest-Release-x86_64
          path: build_system/android/product

      # the step timeout bounds a hung app; the log dump below then still runs
      - name: Run Tests
        timeout-minutes: 90
        shell: bash
        env:
          # the hosted macos runners' paravirtual GPU silently renders MTLHeap-placed resources
          # as solid magenta through MoltenVK; force dedicated allocations instead. no effect on
          # cells that do not run MoltenVK
          MVK_CONFIG_USE_MTLHEAP: 0
          # the suite nests python processes whose block-buffered output would otherwise
          # reach the live log minutes late and out of order
          PYTHONUNBUFFERED: 1
        run: python3 dev/run_tests.py --framework android --config Release --width 1560 --height 720

      - name: Dump app logs
        if: failure()
        shell: bash
        run: |
          echo "=== app logs ==="
          cat build_system/android/output/device/logs/*.log 2>/dev/null || true
          echo "=== emulator log ==="
          cat build_system/android/output/emulator.log 2>/dev/null || true

      - name: Upload Test Screenshot
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-screenshots-android-ubuntu-latest
          path: build_system/android/output/device/screenshots/

  # pushing a version tag assembles a github release from the shipped packages
  github-release:
    name: github release
    if: github.ref_type == 'tag'
    needs: [release-macos-macos, release-macos-ios, release-macos-ios-simulator, release-macos-glfw, release-windows-glfw, release-ubuntu-glfw, release-ubuntu-android, release-ubuntu-android-x86_64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          generate_release_notes: true
          # release-stage products only: build products lack cooked content, and CI also
          # uploads cook artifacts and test screenshots
          files: |
            artifacts/release-*/**/*.zip
            artifacts/release-*/**/*.apk
            artifacts/release-*/**/*.ipa

  ci:
    if: always()
    needs: [changes, format, tidy, build-macos-macos-debug, build-macos-macos-release, build-macos-ios-debug, build-macos-ios-release, build-macos-ios-simulator-release, build-macos-glfw-debug, build-macos-glfw-release, build-windows-glfw-debug, build-windows-glfw-release, build-ubuntu-glfw-debug, build-ubuntu-glfw-release, build-ubuntu-android-debug, build-ubuntu-android-release, build-ubuntu-android-x86_64-release, cook, release-macos-macos, test-macos-macos, release-macos-ios, release-macos-ios-simulator, test-macos-ios-simulator, release-macos-glfw, test-macos-glfw, release-windows-glfw, test-windows-glfw, release-ubuntu-glfw, test-ubuntu-glfw, release-ubuntu-android, release-ubuntu-android-x86_64, test-ubuntu-android-x86_64, github-release]
    runs-on: ubuntu-latest
    steps:
      - run: exit 1
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
