        run: python3 dev/run_tests.py --framework ios --config Release --width 1560 --height 720

      - name: Dump app logs
        if: failure()
        shell: bash
        run: |
          echo "=== app logs ==="
          cat build_system/ios/output/device/logs/*.log 2>/dev/null || true

      # the sleep gives ReportCrash time to land the report in DiagnosticReports
      - name: Dump crash reports
        if: failure()
        shell: bash
        run: |
