  build-macos-glfw-debug:
    name: build (macos-latest, glfw, Debug)
    needs: changes
    if: needs.changes.outputs.code == 'true' && github.ref_type != 'tag'
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Build Platform
        uses: ./.github/actions/build-platform
        with:
          framework: glfw
          os: macos-latest
          build-type: Debug

  build-macos-glfw-release:
    name: build (macos-latest, glfw, Release)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Build Platform
        uses: ./.github/actions/build-platform
        with:
          framework: glfw
          os: macos-latest
          build-type: Release

  build-windows-glfw-debug:
    name: build (windows-latest, glfw, Debug)
    needs: changes
    if: needs.changes.outputs.code == 'true' && github.ref_type != 'tag'
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Build Platform
        uses: ./.github/actions/build-platform
        with:
          framework: glfw
          os: windows-latest
          build-type: Debug

  build-windows-glfw-release:
    name: build (windows-latest, glfw, Release)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Build Platform
        uses: ./.github/actions/build-platform
        with:
          framework: glfw
          os: windows-latest
          build-type: Release

  build-ubuntu-glfw-debug:
    name: build (ubuntu-latest, glfw, Debug)
    needs: changes
    if: needs.changes.outputs.code == 'true' && github.ref_type != 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Build Platform
        uses: ./.github/actions/build-platform
        with:
          framework: glfw
          os: ubuntu-latest
          build-type: Debug

  build-ubuntu-glfw-release:
    name: build (ubuntu-latest, glfw, Release)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Build Platform
        uses: ./.github/actions/build-platform
        with:
          framework: glfw
          os: ubuntu-latest
          build-type: Release

  build-ubuntu-android-debug:
    name: build (ubuntu-latest, android, Debug)
    needs: changes
    if: needs.changes.outputs.code == 'true' && github.ref_type != 'tag'
