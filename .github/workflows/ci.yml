name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'libraries/**'
              - 'frameworks/**'
              - 'shaders/**'
              - 'thirdparty/**'
              - 'build_system/**'
              - 'resources/**'
              - 'dev/**'
              - '.github/**'
              - '.gitmodules'
              - 'CMakeLists.txt'
              - 'build.py'
              - 'prerequisites.json'

  build:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    uses: ./.github/workflows/build.yml
    secrets: inherit

  # runs unconditionally: it is cheap and also covers files outside the code filter (e.g. docs)
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install formatters
        run: pip install clang-format==22.1.5 autopep8==2.3.2
      - name: Check formatting
        run: python3 dev/check_format.py

  # clang-tidy needs a compile database, which requires a real CMake configure with
  # dependencies fetched; the glfw configure on macos is the cheapest one CI already exercises
  tidy:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Environment
        id: setup-environment
        uses: ./.github/actions/setup-environment
        with:
          framework: glfw
          os: macos-latest
      - name: Install clang-tidy
        run: pip install clang-tidy==22.1.7
      # dependency downloads during the configure fail on transient network errors, retry cheaply
      - name: Configure
        shell: bash
        run: |
          for attempt in 1 2 3; do
            python3 build.py --framework glfw --config Release --clangd ${{ steps.setup-environment.outputs.build-args }} && exit 0
            echo "configure attempt ${attempt} failed"
            sleep 20
          done
          exit 1
      - name: Check clang-tidy
        run: python3 dev/check_tidy.py

  ci:
    if: always()
    needs: [changes, build, format, tidy]
    runs-on: ubuntu-latest
    steps:
      - run: exit 1
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
