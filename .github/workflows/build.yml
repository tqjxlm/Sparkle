name: Pipeline

on:
  workflow_call:
    inputs:
      build_type:
        description: "Build configuration (Debug, Release, or both)"
        type: string
        default: '"Debug","Release"'

# stages: build (every product in parallel, the heavy stage) -> cook (macos-release, on
# the macos runners' real Metal GPU) -> release + test, a per-product chain
# (.github/workflows/release-test.yml): release swaps in the cooked content image and
# re-signs (Debug builds are compile-coverage only and are never released), then the
# cells whose release carries a suite config (from tests/coverage.csv) run the suite
# through a real needs edge on their own release. a cell waits only for the shared cook
# and its own product's build, never other products': the chain -> cook edge is a real
# needs edge, while the edge to the product's own build cannot be a needs, since needs
# cannot target a single matrix cell — it is an await-by-name instead
# (.github/actions/wait-for-job). the macos-release build is the one standalone job,
# because cook's needs edge must target it. the two matrices come from one product
# table: the plan node computes them with dev/ci_matrix.py.
jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.plan.outputs.build }}
      release: ${{ steps.plan.outputs.release }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute matrices
        id: plan
        shell: bash
        run: python3 dev/ci_matrix.py --build_types '${{ inputs.build_type }}' >> "$GITHUB_OUTPUT"

  build:
    needs: plan
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.build) }}
      max-parallel: 16

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Platform
        uses: ./.github/actions/build-platform
        with:
          framework: ${{ matrix.framework }}
          os: ${{ matrix.os }}
          build-type: ${{ matrix.build_type }}
          abi: ${{ matrix.abi }}
          ios-certificate-p12-base64: ${{ secrets.APPLE_DEVELOPMENT_CERTIFICATE_P12_BASE64 }}
          ios-certificate-password: ${{ secrets.APPLE_DEVELOPMENT_CERTIFICATE_PASSWORD }}
          ios-team-id: ${{ secrets.APPLE_DEVELOPER_TEAM_ID }}
          ios-appstore-issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          ios-appstore-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          ios-appstore-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}

  build-macos-release:
    name: build (macos-latest, macos, Release)
    if: contains(inputs.build_type, 'Release')
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Platform
        uses: ./.github/actions/build-platform
        with:
          framework: macos
          os: macos-latest
          build-type: Release

  cook:
    name: cook (macos-latest, macos, Release)
    needs: build-macos-release
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Environment
        id: setup-environment
        uses: ./.github/actions/setup-environment
        with:
          framework: macos
          os: macos-latest

      - name: Download build product
        uses: actions/download-artifact@v4
        with:
          name: build-macos-macos-latest-Release
          path: build_system/macos/product

      # ditto, not python zipfile: extraction must preserve the executable bit of the app binary
      - name: Extract app
        run: |
          mkdir -p build_system/macos/output/build
          ditto -x -k build_system/macos/product/macos-Release.zip build_system/macos/output/build/

      - name: Cook
        shell: bash
        run: |
          # a hung app never fails the step on its own; kill it so the diagnostics below run
          ( sleep 900 && echo "cook watchdog fired" && pkill -f sparkle.app/Contents/MacOS/sparkle ) &
          WATCHDOG=$!
          if ! python3 build.py --framework macos --config Release --stage cook ${{ steps.setup-environment.outputs.build-args }}; then
            kill $WATCHDOG 2>/dev/null || true
            echo "=== app logs ==="; cat ~/Documents/sparkle/logs/*.log 2>/dev/null || true
            echo "=== crash reports ==="
            sleep 10
            for f in ~/Library/Logs/DiagnosticReports/sparkle*; do echo "--- $f"; cat "$f"; done 2>/dev/null || true
            exit 1
          fi
          kill $WATCHDOG 2>/dev/null || true
          test -f build_system/macos/output/cooked_image/cooked/manifest.json

      - name: Upload cooked content image
        uses: actions/upload-artifact@v4
        with:
          name: cooked-shared
          path: build_system/macos/output/cooked_image

  release:
    name: release (${{ matrix.os }}, ${{ matrix.framework }}, ${{ matrix.build_type }}${{ matrix.abi != '' && format(', {0}', matrix.abi) || '' }})
    needs: [plan, cook]
    # debug builds get no release cell, so a Debug-only selection leaves this table
    # empty, and GitHub rejects empty matrices
    if: needs.plan.outputs.release != '[]'

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.release) }}

    uses: ./.github/workflows/release-test.yml
    secrets: inherit
    with:
      os: ${{ matrix.os }}
      framework: ${{ matrix.framework }}
      build_type: ${{ matrix.build_type }}
      abi: ${{ matrix.abi }}
      test: ${{ matrix.test || false }}
      suite_args: ${{ matrix.suite_args }}
      suite_timeout: ${{ matrix.suite_timeout || 0 }}
      screenshots: ${{ matrix.screenshots }}

