name: Pipeline

on:
  workflow_call:
    inputs:
      build_type:
        description: "Build configuration (Debug, Release, or both)"
        type: string
        default: '"Debug","Release"'

# stages: build (every product in parallel, the heavy stage) -> cook (macos-release, on
# the macos runners' real Metal GPU) -> release (every product: inject the cooked content
# and re-sign) -> test (the test table in the test job decides which released products run
# the suite and with what coverage). a cell waits only for the shared cook and its own
# product's upstream cell, never other products': the stage -> cook edges are real needs
# edges, while the edge to the product's own build (for release cells) or release (for
# test cells) cannot be a needs, since needs cannot target a single matrix cell — it is an
# await-by-name instead (.github/actions/wait-for-job). the macos-release build is the one
# standalone job, because cook's needs edge must target it.
jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
        framework: [android, glfw, macos, ios]
        build_type: ${{ fromJSON(format('[{0}]', inputs.build_type)) }}
        exclude:
          - os: windows-latest
            framework: macos
          - os: windows-latest
            framework: android
          - os: windows-latest
            framework: ios
          # built by the standalone job cook's needs edge targets
          - os: macos-latest
            framework: macos
            build_type: Release
          - os: ubuntu-latest
            framework: macos
          - os: ubuntu-latest
            framework: ios
          - os: ubuntu-latest
            framework: glfw
          - os: macos-latest
            framework: android
      max-parallel: 16

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Platform
        uses: ./.github/actions/build-platform
        with:
          framework: ${{ matrix.framework }}
          os: ${{ matrix.os }}
          build-type: ${{ matrix.build_type }}
          ios-certificate-p12-base64: ${{ secrets.APPLE_DEVELOPMENT_CERTIFICATE_P12_BASE64 }}
          ios-certificate-password: ${{ secrets.APPLE_DEVELOPMENT_CERTIFICATE_PASSWORD }}
          ios-team-id: ${{ secrets.APPLE_DEVELOPER_TEAM_ID }}
          ios-appstore-issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          ios-appstore-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          ios-appstore-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}

  build-macos-release:
    name: build (macos-latest, macos, Release)
    if: contains(inputs.build_type, 'Release')
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Platform
        uses: ./.github/actions/build-platform
        with:
          framework: macos
          os: macos-latest
          build-type: Release

  cook:
    name: cook (macos-latest, macos, Release)
    needs: build-macos-release
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Environment
        id: setup-environment
        uses: ./.github/actions/setup-environment
        with:
          framework: macos
          os: macos-latest

      - name: Download build product
        uses: actions/download-artifact@v4
        with:
          name: build-macos-macos-latest-Release
          path: build_system/macos/product

      # ditto, not python zipfile: extraction must preserve the executable bit of the app binary
      - name: Extract app
        run: |
          mkdir -p build_system/macos/output/build
          ditto -x -k build_system/macos/product/macos-Release.zip build_system/macos/output/build/

      - name: Cook
        shell: bash
        run: |
          # a hung app never fails the step on its own; kill it so the diagnostics below run
          ( sleep 900 && echo "cook watchdog fired" && pkill -f sparkle.app/Contents/MacOS/sparkle ) &
          WATCHDOG=$!
          if ! python3 build.py --framework macos --config Release --stage cook ${{ steps.setup-environment.outputs.build-args }}; then
            kill $WATCHDOG 2>/dev/null || true
            echo "=== app logs ==="; cat ~/Documents/sparkle/logs/*.log 2>/dev/null || true
            echo "=== crash reports ==="
            sleep 10
            for f in ~/Library/Logs/DiagnosticReports/sparkle*; do echo "--- $f"; cat "$f"; done 2>/dev/null || true
            exit 1
          fi
          kill $WATCHDOG 2>/dev/null || true
          test -f build_system/macos/output/build/sparkle.app/Contents/SharedSupport/cooked/manifest.json

      - name: Upload cooked artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cooked-shared
          path: build_system/macos/output/build/sparkle.app/Contents/SharedSupport/cooked

  release:
    needs: cook
    # apple signing needs a macos runner; injection elsewhere is zip surgery, ubuntu starts fastest
    runs-on: ${{ (matrix.framework == 'macos' || matrix.framework == 'ios') && 'macos-latest' || 'ubuntu-latest' }}

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
        framework: [android, glfw, macos, ios]
        build_type: ${{ fromJSON(format('[{0}]', inputs.build_type)) }}
        exclude:
          - os: windows-latest
            framework: macos
          - os: windows-latest
            framework: android
          - os: windows-latest
            framework: ios
          - os: ubuntu-latest
            framework: macos
          - os: ubuntu-latest
            framework: ios
          - os: ubuntu-latest
            framework: glfw
          - os: macos-latest
            framework: android

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # needs cannot target a single matrix cell, so the edge to this product's own build
      # is a job-name await. it only ever waits while few macos builds remain (cook, a
      # macos build, is already done), so waiting cells cannot starve the build queue
      - name: Wait for this product's build
        uses: ./.github/actions/wait-for-job
        with:
          job-name: build (${{ matrix.os }}, ${{ matrix.framework }}, ${{ matrix.build_type }})

      - name: Release Platform
        uses: ./.github/actions/release-platform
        with:
          framework: ${{ matrix.framework }}
          os: ${{ matrix.os }}
          build-type: ${{ matrix.build_type }}
          macos-certificate-p12-base64: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_P12_BASE64 }}
          macos-certificate-password: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_PASSWORD }}
          macos-signing-identity: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          macos-notarization-username: ${{ secrets.APPLE_NOTARIZATION_USERNAME }}
          macos-notarization-password: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
          apple-team-id: ${{ secrets.APPLE_DEVELOPER_TEAM_ID }}
          ios-certificate-p12-base64: ${{ secrets.APPLE_DEVELOPMENT_CERTIFICATE_P12_BASE64 }}
          ios-certificate-password: ${{ secrets.APPLE_DEVELOPMENT_CERTIFICATE_PASSWORD }}
          ios-appstore-issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          ios-appstore-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          ios-appstore-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}

  test:
    name: test (${{ matrix.os }}, ${{ matrix.framework }}, ${{ matrix.build_type }})
    needs: cook
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      # the test table: which released products run the aggregate suite, and with what
      # coverage. a product absent from the table ships untested (no runner can drive it yet)
      matrix:
        include:
          # no GPU on hosted windows runners: software vulkan via lavapipe, which can
          # take the suite close to an hour (see TODO.md), hence the generous timeout
          - os: windows-latest
            framework: glfw
            build_type: Release
            suite_args: --software --headless --require_cooked
            suite_timeout: 120
            screenshots: build_system/glfw/output/build/generated/screenshots/
          # physical Metal GPU (the runner class the cook stage relies on). its
          # virtualized device exposes no ray tracing, so the gpu path-tracing pipeline
          # (and NRD) silently falls back to forward and cannot be tested here
          - os: macos-latest
            framework: macos
            build_type: Release
            suite_args: --headless --require_cooked
            suite_timeout: 60
            screenshots: ~/Documents/sparkle/screenshots/

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # same await-by-name edge the release cells use for their builds: a test cell
      # waits only for its own product's release, never other products'
      - name: Wait for this product's release
        uses: ./.github/actions/wait-for-job
        with:
          job-name: release (${{ matrix.os }}, ${{ matrix.framework }}, ${{ matrix.build_type }})

      # the suite drives the app through build.py, which needs the build prerequisites
      - name: Setup Environment
        if: matrix.framework == 'macos'
        uses: ./.github/actions/setup-environment
        with:
          framework: ${{ matrix.framework }}
          os: ${{ matrix.os }}

      - name: Setup Mesa Lavapipe
        if: matrix.os == 'windows-latest'
        uses: ./.github/actions/setup-mesa

      # the release package already carries the cooked content in its packed resources
      - name: Download app
        uses: actions/download-artifact@v4
        with:
          name: release-${{ matrix.framework }}-${{ matrix.os }}-${{ matrix.build_type }}
          path: build_system/${{ matrix.framework }}/product

      - name: Extract app (glfw)
        if: matrix.framework == 'glfw'
        shell: bash
        run: >-
          python3 -m zipfile -e build_system/glfw/product/windows-glfw-${{ matrix.build_type }}.zip
          build_system/glfw/output/

      # ditto, not python zipfile: extraction must preserve the executable bit of the app binary
      - name: Extract app (macos)
        if: matrix.framework == 'macos'
        shell: bash
        run: |
          mkdir -p build_system/macos/output/build
          ditto -x -k build_system/macos/product/macos-${{ matrix.build_type }}.zip build_system/macos/output/build/

      # the step timeout bounds a hung app; the log dump below then still runs
      - name: Run Tests
        timeout-minutes: ${{ matrix.suite_timeout }}
        shell: bash
        run: >-
          python3 dev/run_tests.py --framework ${{ matrix.framework }} --config ${{ matrix.build_type }}
          --skip_build ${{ matrix.suite_args }}

      - name: Dump app logs
        if: failure() && matrix.framework == 'macos'
        shell: bash
        run: |
          echo "=== app logs ==="; cat ~/Documents/sparkle/logs/*.log 2>/dev/null || true
          echo "=== crash reports ==="
          sleep 10
          for f in ~/Library/Logs/DiagnosticReports/sparkle*; do echo "--- $f"; cat "$f"; done 2>/dev/null || true

      - name: Upload Test Screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots-${{ matrix.framework }}-${{ matrix.os }}
          path: ${{ matrix.screenshots }}

