name: "Wait for Job"
description: "Await another job of this run by display name, for edges needs cannot express (a single matrix cell)"
inputs:
  job-name:
    description: "Display name of the job to await; matched by suffix because reusable workflows prefix job names"
    required: true
runs:
  using: "composite"
  steps:
    - name: Wait for ${{ inputs.job-name }}
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        JOB_NAME: ${{ inputs.job-name }}
      run: |
        for _ in $(seq 1 90); do
          conclusion=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/jobs?per_page=100" \
            --jq "[.jobs[] | select(.name | endswith(\"$JOB_NAME\")) | .conclusion // \"\"][0]")
          case "$conclusion" in
            success) exit 0 ;;
            failure|cancelled|timed_out|skipped) echo "$JOB_NAME concluded: $conclusion"; exit 1 ;;
            *) sleep 40 ;;
          esac
        done
        echo "timed out waiting for $JOB_NAME"; exit 1
